  - {id: art-voxel-car-crowbar, title: "Voxel car: Crowbar (Wreckhouse C)", type: art, group: voxel, size: default, status: todo, blockers: [art-voxel-brand-families, art-voxel-car-kerb]}
  - {id: art-voxel-car-fuse, title: "Voxel car: Fuse (Mayfly C)", type: art, group: voxel, size: default, status: todo, blockers: [art-voxel-brand-families, art-voxel-car-kerb]}
  - {id: art-voxel-car-meridian, title: "Voxel car: Meridian (Apex B)", type: art, group: voxel, size: default, status: todo, blockers: [art-voxel-brand-families, art-voxel-car-kerb]}
  - {id: art-voxel-car-anvil, title: "Voxel car: Anvil (Wreckhouse B)", type: art, group: voxel, size: default, status: todo, blockers: [art-voxel-brand-families, art-voxel-car-kerb]}
  - {id: art-voxel-car-strobe, title: "Voxel car: Strobe (Mayfly B)", type: art, group: voxel, size: default, status: todo, blockers: [art-voxel-brand-families, art-voxel-car-kerb]}
