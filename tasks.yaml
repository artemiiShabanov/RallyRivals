  - {id: code-meta-chapters, title: "Chapter CP gate (~70%) + advance on boss win", type: code, group: meta, size: big, status: todo, blockers: [code-meta-economy, code-ai-boss]}

  # ---------- content ----------
  - {id: content-surfaces-defs, title: "SurfaceType resources (asphalt/dirt/snow/sand/gravel/ice)", type: content, group: surfaces, size: default, status: done, blockers: []}
  - {id: content-cars-roster, title: "Define car stat roster (classes S-D)", type: content, group: cars, size: default, status: done, blockers: []}
  - {id: content-cars-manufacturers, title: "Define 3-4 manufacturers (identity + brand feature)", type: content, group: cars, size: default, status: done, blockers: []}
  - {id: content-rivals-defs, title: "Define 4 boss-rivals + taunts", type: content, group: rivals, size: default, status: todo, blockers: []}
  - {id: content-rivals-campaign, title: "4-chapter structure (class mixes, boss per chapter)", type: content, group: rivals, size: default, status: todo, blockers: [content-rivals-defs]}
  - {id: content-rivals-story, title: "Story beats: intro, chapter transitions, ending", type: content, group: rivals, size: small, status: todo, blockers: [content-rivals-defs]}
  - {id: content-tracks-first, title: "First real track (heightmap/surface/markers images)", type: content, group: tracks, size: big, status: todo, blockers: [code-track-bake-tool]}
  # umbrella — split into per-track tasks once v1 scope (GDD 12) settles chapter/track counts
  - {id: content-tracks-campaign, title: "Campaign track set (v1 regions x races)", type: content, group: tracks, size: huge, status: todo, blockers: [content-tracks-first, content-rivals-campaign]}

