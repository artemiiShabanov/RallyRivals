  - {id: code-ui-pause, title: "Pause menu", type: code, group: ui, size: small, status: todo, blockers: [code-core-scene-flow]}

  # ---------- code: meta (progression / economy) ----------
  - {id: code-meta-currencies, title: "Money + CP wallets", type: code, group: meta, size: small, status: todo, blockers: []}
  - {id: code-meta-economy, title: "Banked-best top-up payout economy", type: code, group: meta, size: big, status: todo, blockers: [code-race-result, code-meta-currencies, code-race-defs]}
  - {id: code-meta-classes, title: "Class system S-D + class gating", type: code, group: meta, size: default, status: todo, blockers: [content-cars-roster]}
