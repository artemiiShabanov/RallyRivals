# RallyRivals — task backlog (single source of truth).
# Edit by hand, or use tasks.py. After edits run:  python3 tasks.py sync
#
# Each task: id (type-group-slug), title, type, group, size, status, blockers[].
#   size:   micro=15m  small=30m  default=1h  big=2h  huge=3h+
#   status: todo | wip | done
#   Tasks must be ATOMIC (not breakable into smaller tasks). Order comes from blockers.

meta:
  sizes: {micro: 15m, small: 30m, default: 1h, big: 2h, huge: 3h+}
  types:
    code:    [core, vehicle, track, ai, race, meta, ui, tools]
    art:     [voxel, vfx, ui-art, world, shader]
    audio:   [sfx, music]
    content: [tracks, cars, rivals, surfaces]
    balance: [handling, economy, difficulty, surfaces]
    design:  [gdd, adr, spec, playtest]
    setup:   [config, build, repo]

tasks:
  # ---------- done so far ----------
  - {id: setup-config-scaffold, title: "Project scaffold, folders, renderer/display config", type: setup, group: config, size: default, status: done, blockers: []}
  - {id: setup-config-input, title: "Input map (keyboard + gamepad)", type: setup, group: config, size: default, status: done, blockers: []}
  - {id: setup-repo-conventions, title: "Repo conventions + prototypes/ excluded from release", type: setup, group: repo, size: small, status: done, blockers: []}
  - {id: design-gdd-pillars, title: "Three design pillars", type: design, group: gdd, size: default, status: done, blockers: []}
  - {id: design-gdd-fill, title: "Fill canonical GDD", type: design, group: gdd, size: big, status: done, blockers: [design-gdd-pillars]}
  - {id: design-adr-physics, title: "ADR-001: vehicle physics model", type: design, group: adr, size: big, status: done, blockers: []}
  - {id: design-adr-track, title: "ADR-002: track representation", type: design, group: adr, size: huge, status: done, blockers: [design-adr-physics]}

  # ---------- code: track ----------
  - {id: code-track-generator, title: "Image-driven track baker (images -> static scene) to scripts/", type: code, group: track, size: big, status: done, blockers: [design-adr-track]}
  - {id: code-track-test-track, title: "Gray-box test track (authored images + tuned TrackPath)", type: code, group: track, size: default, status: done, blockers: [code-track-generator]}
  - {id: code-track-checkpoints, title: "Checkpoint gates baked from the spline", type: code, group: track, size: default, status: done, blockers: [code-track-generator]}
  - {id: code-track-bake-tool, title: "Bake tool as in-editor @tool button", type: code, group: tools, size: default, status: done, blockers: [code-track-generator]}
  - {id: code-track-seasons, title: "Seasonal visual swap (author-picked per race)", type: code, group: track, size: default, status: todo, blockers: [code-track-generator]}
  - {id: code-track-props, title: "Prop scatter from marker map", type: code, group: track, size: default, status: todo, blockers: [code-track-generator]}
  - {id: code-track-ai-line, title: "Bake AI racing line from the spline", type: code, group: track, size: default, status: todo, blockers: [code-track-generator]}
  - {id: code-track-weather-grip, title: "Weather grip modifier (stacks on surface grip)", type: code, group: track, size: small, status: done, blockers: [code-vehicle-surface-grip]}
  - {id: code-track-conditions, title: "Apply per-race time-of-day + weather visuals", type: code, group: track, size: default, status: done, blockers: [code-race-defs]}
  - {id: code-tools-debug, title: "Debug overlay/tools (perf, physics, state readouts)", type: code, group: tools, size: default, status: done, blockers: []}

  # ---------- code: tools — GUI map editor (in-game tool scene; authors the 4 track images) ----------
  # Key design decision: the heightmap is NOT hand-painted — it derives from the painted road
  # (flat corridor + shoulders + noise, per gen_demo_images) + height control points. Kills the
  # invisible-bump class of authoring errors by construction.
  - {id: code-tools-map-editor-shell, title: "Map editor: canvas shell (zoom/pan, blueprint underlay, layer toggles, save/load)", type: code, group: tools, size: huge, status: done, blockers: []}
  - {id: code-tools-map-editor-surface, title: "Map editor: surface paint brush (palette from .tres, sizes, off-road eraser)", type: code, group: tools, size: big, status: done, blockers: [code-tools-map-editor-shell]}
  - {id: code-tools-map-editor-race, title: "Map editor: race tools (start/dir/gate pairs + validation)", type: code, group: tools, size: big, status: done, blockers: [code-tools-map-editor-shell]}
  - {id: code-tools-map-editor-props, title: "Map editor: prop stamp tool", type: code, group: tools, size: small, status: done, blockers: [code-tools-map-editor-shell]}
  - {id: code-tools-map-editor-height, title: "Map editor: auto-heightmap from road + height control points", type: code, group: tools, size: huge, status: done, blockers: [code-tools-map-editor-surface]}
  - {id: code-tools-map-editor-export, title: "Map editor: export 4 images + one-click bake", type: code, group: tools, size: default, status: done, blockers: [code-tools-map-editor-surface, code-tools-map-editor-race]}

  # ---------- code: track — point-to-point (sprint) support ----------
  - {id: code-track-point-to-point, title: "Point-to-point tracks (cyan finish pair: open march/curve, finish gate, editor tool)", type: code, group: track, size: big, status: done, blockers: [code-track-checkpoints, code-tools-map-editor-race]}

  # ---------- code: vehicle ----------
  - {id: code-vehicle-controller, title: "Promote VehicleBody3D controller to scripts/", type: code, group: vehicle, size: big, status: done, blockers: [design-adr-physics]}
  - {id: code-vehicle-grip, title: "Front/rear grip + handbrake drift layer", type: code, group: vehicle, size: default, status: done, blockers: [code-vehicle-controller]}
  - {id: code-vehicle-surface-grip, title: "Per-surface grip via SurfaceType", type: code, group: vehicle, size: default, status: done, blockers: [code-vehicle-controller, content-surfaces-defs]}
  - {id: code-vehicle-damage, title: "Damage system (visible + performance)", type: code, group: vehicle, size: big, status: todo, blockers: [code-vehicle-controller]}
  - {id: code-vehicle-slipstream, title: "Slipstream (player-only) + FX", type: code, group: vehicle, size: default, status: todo, blockers: [code-vehicle-controller, code-ai-rival]}
  - {id: code-vehicle-stats, title: "Drive handling from the 5 stat bars", type: code, group: vehicle, size: default, status: done, blockers: [code-vehicle-controller]}
  - {id: code-vehicle-brand-features, title: "Baked-in brand abilities (nitro etc.)", type: code, group: vehicle, size: default, status: todo, blockers: [code-vehicle-controller]}
  - {id: code-vehicle-airborne, title: "Airborne handling (jumps: air control + landing)", type: code, group: vehicle, size: default, status: todo, blockers: [code-vehicle-controller]}

  # ---------- code: core / race / ai / ui ----------
  - {id: code-core-camera, title: "Chase camera (promote from prototype)", type: code, group: core, size: default, status: done, blockers: [code-vehicle-controller]}
  - {id: code-core-scene-flow, title: "Scene/flow manager + pause", type: code, group: core, size: default, status: todo, blockers: []}
  - {id: code-core-save, title: "Save system", type: code, group: core, size: default, status: todo, blockers: [code-core-scene-flow]}
  - {id: code-core-pooling, title: "Pooling / perf helpers (perf-first rule)", type: code, group: core, size: default, status: todo, blockers: []}
  - {id: code-core-settings-apply, title: "Apply graphics/audio/control settings", type: code, group: core, size: small, status: todo, blockers: [code-core-scene-flow]}
  - {id: code-race-defs, title: "RaceDef resource (track, type, culture, conditions, reward pools)", type: code, group: race, size: default, status: done, blockers: []}
  - {id: code-race-timing, title: "Lap/stage timing", type: code, group: race, size: default, status: done, blockers: [code-track-checkpoints]}
  - {id: code-race-result, title: "Win/lose + finishing place", type: code, group: race, size: default, status: todo, blockers: [code-race-timing]}
  - {id: code-race-types, title: "Race types: sprint + circuit", type: code, group: race, size: big, status: todo, blockers: [code-race-timing]}
  - {id: code-race-timetrial, title: "Race type: time trial vs clock", type: code, group: race, size: small, status: todo, blockers: [code-race-timing]}
  - {id: code-race-endurance, title: "Race type: endurance / attrition", type: code, group: race, size: default, status: todo, blockers: [code-race-types]}
  - {id: code-race-grandprix, title: "Race type: grand prix (qualify + grid + class gate)", type: code, group: race, size: big, status: todo, blockers: [code-race-types, code-meta-classes]}
  - {id: code-race-contact, title: "Officials penalty vs Wilds ramming rules", type: code, group: race, size: default, status: todo, blockers: [code-race-result, code-race-defs]}
  - {id: code-ai-rival, title: "AI rival driving a baked spline line", type: code, group: ai, size: huge, status: todo, blockers: [code-track-ai-line, code-vehicle-controller]}
  - {id: code-ai-difficulty, title: "Difficulty via opponents + track complexity", type: code, group: ai, size: default, status: todo, blockers: [code-ai-rival]}
  - {id: code-ai-boss, title: "Boss-rival duel behavior", type: code, group: ai, size: default, status: todo, blockers: [code-ai-rival]}
  - {id: code-ui-statbars, title: "Five stat bars display widget", type: code, group: ui, size: small, status: todo, blockers: []}
  - {id: code-ui-hud, title: "Basic HUD (speed / position / timer)", type: code, group: ui, size: default, status: todo, blockers: [code-race-timing]}
  - {id: code-ui-menus, title: "Menus + settings + input remap", type: code, group: ui, size: big, status: todo, blockers: [code-core-scene-flow]}
  - {id: code-ui-loading, title: "Loading screen (async scene load)", type: code, group: ui, size: small, status: todo, blockers: [code-core-scene-flow]}
  - {id: code-ui-prerace, title: "Pre-race info screen", type: code, group: ui, size: default, status: todo, blockers: [code-ui-statbars, code-race-defs]}
  - {id: code-ui-results, title: "Post-race results + rewards screen", type: code, group: ui, size: default, status: todo, blockers: [code-race-result, code-meta-economy]}
  - {id: code-ui-career-map, title: "Region map of races + CP/boss progress", type: code, group: ui, size: big, status: todo, blockers: [code-core-scene-flow, code-meta-chapters, code-race-defs]}
  - {id: code-ui-shop, title: "Car shop screen", type: code, group: ui, size: default, status: todo, blockers: [code-meta-shop]}
  - {id: code-ui-garage, title: "Garage / car-select screen", type: code, group: ui, size: default, status: todo, blockers: [code-meta-garage]}
