  - {id: art-vfx-nitro, title: "Nitro/boost FX", type: art, group: vfx, size: small, status: todo, blockers: [code-vehicle-brand-features]}
  - {id: art-ui-portraits, title: "Boss-rival static pixel portraits", type: art, group: ui-art, size: default, status: todo, blockers: [content-rivals-defs]}
  - {id: art-ui-hud-gfx, title: "HUD gauges/glow graphics", type: art, group: ui-art, size: default, status: todo, blockers: []}
  - {id: art-ui-theme, title: "Menu/UI theme + icon set", type: art, group: ui-art, size: big, status: todo, blockers: []}
