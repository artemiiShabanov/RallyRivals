  - {id: art-voxel-stubs, title: "Voxel inventory scaffold: 45 car + 3 wheel stubs with .vox sources", type: art, group: voxel, size: small, status: done, blockers: [art-voxel-car-blockout, art-world-palette]}
  - {id: code-vehicle-model-wiring, title: "CarDef model refs: body/wheel meshes swap with the car", type: code, group: vehicle, size: small, status: done, blockers: [code-vehicle-stats, art-voxel-stubs]}
  - {id: code-vehicle-lights, title: "Head/taillights: night beams via LightingPreset + brake flare", type: code, group: vehicle, size: small, status: done, blockers: [art-world-lighting]}
  - {id: art-voxel-props, title: "Voxel prop set (rocks/signs/barriers)", type: art, group: voxel, size: default, status: todo, blockers: []}
  - {id: art-voxel-environment, title: "Voxel scenery/buildings set", type: art, group: voxel, size: big, status: todo, blockers: []}
  - {id: art-voxel-brand-families, title: "Visual family per manufacturer", type: art, group: voxel, size: default, status: todo, blockers: [content-cars-roster]}
